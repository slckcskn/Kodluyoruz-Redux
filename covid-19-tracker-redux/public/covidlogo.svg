<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320">
  <rect width="100%" height="100%" fill="white"></rect>

  <!-- Virus body -->
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ff6b6b"></stop>
      <stop offset="100%" stop-color="#c62828"></stop>
    </radialGradient>
  </defs>

  <circle cx="160" cy="160" r="70" fill="url(#g1)"></circle>

  <!-- spikes -->
  <g stroke="#c62828" stroke-width="10" stroke-linecap="round">
    <line x1="160" y1="40" x2="160" y2="85"></line>
    <line x1="160" y1="235" x2="160" y2="280"></line>
    <line x1="40" y1="160" x2="85" y2="160"></line>
    <line x1="235" y1="160" x2="280" y2="160"></line>

    <line x1="85" y1="85" x2="120" y2="120"></line>
    <line x1="235" y1="85" x2="200" y2="120"></line>
    <line x1="85" y1="235" x2="120" y2="200"></line>
    <line x1="235" y1="235" x2="200" y2="200"></line>

    <line x1="110" y1="45" x2="135" y2="90"></line>
    <line x1="210" y1="45" x2="185" y2="90"></line>
    <line x1="110" y1="275" x2="135" y2="230"></line>
    <line x1="210" y1="275" x2="185" y2="230"></line>
  </g>

  <!-- spike tips -->
  <g fill="#e53935">
    <circle cx="160" cy="35" r="10"></circle>
    <circle cx="160" cy="285" r="10"></circle>
    <circle cx="35" cy="160" r="10"></circle>
    <circle cx="285" cy="160" r="10"></circle>

    <circle cx="80" cy="80" r="9"></circle>
    <circle cx="240" cy="80" r="9"></circle>
    <circle cx="80" cy="240" r="9"></circle>
    <circle cx="240" cy="240" r="9"></circle>

    <circle cx="110" cy="40" r="8"></circle>
    <circle cx="210" cy="40" r="8"></circle>
    <circle cx="110" cy="280" r="8"></circle>
    <circle cx="210" cy="280" r="8"></circle>
  </g>

  <!-- text -->
  <text x="360" y="185" font-family="Arial, Helvetica, sans-serif" font-size="90" font-weight="bold" fill="#333">
    COVID-19
  </text>
</svg>